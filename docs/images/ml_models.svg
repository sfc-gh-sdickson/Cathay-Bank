<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 510" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="sh">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="920" height="510" fill="#ffffff"/>
  <text x="460" y="32" text-anchor="middle" fill="#1a1a2e" font-size="22" font-weight="bold">ML Model Pipeline</text>
  <text x="460" y="52" text-anchor="middle" fill="#666" font-size="11">Snowflake Model Registry | GradientBoosting Ensemble</text>

  <rect x="30" y="75" width="150" height="140" rx="8" fill="#eaf7fc" stroke="#29b5e8" stroke-width="1.5" filter="url(#sh)"/>
  <text x="105" y="100" text-anchor="middle" fill="#0e7fad" font-size="12" font-weight="bold">Data Sources</text>
  <text x="105" y="122" text-anchor="middle" fill="#555" font-size="10">CUSTOMERS</text>
  <text x="105" y="140" text-anchor="middle" fill="#555" font-size="10">ACCOUNTS</text>
  <text x="105" y="158" text-anchor="middle" fill="#555" font-size="10">TRANSACTIONS</text>
  <text x="105" y="176" text-anchor="middle" fill="#555" font-size="10">LOANS</text>
  <text x="105" y="194" text-anchor="middle" fill="#555" font-size="10">SUPPORT_CASES</text>

  <line x1="180" y1="145" x2="218" y2="145" stroke="#29b5e8" stroke-width="1.5"/>
  <polygon points="216,141 226,145 216,149" fill="#29b5e8"/>

  <rect x="230" y="75" width="170" height="140" rx="8" fill="#f3f0ff" stroke="#7b61ff" stroke-width="1.5" filter="url(#sh)"/>
  <text x="315" y="100" text-anchor="middle" fill="#5a3ec8" font-size="12" font-weight="bold">Feature Engineering</text>
  <text x="315" y="122" text-anchor="middle" fill="#555" font-size="10">Credit Score</text>
  <text x="315" y="140" text-anchor="middle" fill="#555" font-size="10">Income, Age, Tenure</text>
  <text x="315" y="158" text-anchor="middle" fill="#555" font-size="10">Balance Aggregations</text>
  <text x="315" y="176" text-anchor="middle" fill="#555" font-size="10">Transaction Patterns</text>
  <text x="315" y="194" text-anchor="middle" fill="#555" font-size="10">Label Encoding</text>

  <line x1="400" y1="145" x2="438" y2="145" stroke="#7b61ff" stroke-width="1.5"/>
  <polygon points="436,141 446,145 436,149" fill="#7b61ff"/>

  <rect x="450" y="68" width="200" height="48" rx="6" fill="#fff3ed" stroke="#e8530e" stroke-width="1.5" filter="url(#sh)"/>
  <text x="550" y="89" text-anchor="middle" fill="#b33f08" font-size="12" font-weight="bold">Churn Prediction</text>
  <text x="550" y="106" text-anchor="middle" fill="#888" font-size="9">GBC | 200 trees | 18 features</text>

  <rect x="450" y="125" width="200" height="48" rx="6" fill="#f3f0ff" stroke="#7b61ff" stroke-width="1.5" filter="url(#sh)"/>
  <text x="550" y="146" text-anchor="middle" fill="#5a3ec8" font-size="12" font-weight="bold">Credit Risk Scoring</text>
  <text x="550" y="163" text-anchor="middle" fill="#888" font-size="9">GBC | 200 trees | 16 features</text>

  <rect x="450" y="182" width="200" height="48" rx="6" fill="#edf9f0" stroke="#00a843" stroke-width="1.5" filter="url(#sh)"/>
  <text x="550" y="203" text-anchor="middle" fill="#007a31" font-size="12" font-weight="bold">Customer LTV</text>
  <text x="550" y="220" text-anchor="middle" fill="#888" font-size="9">GBR | 200 trees | 15 features</text>

  <line x1="650" y1="145" x2="688" y2="145" stroke="#e8530e" stroke-width="1.5"/>
  <polygon points="686,141 696,145 686,149" fill="#e8530e"/>

  <rect x="700" y="75" width="190" height="155" rx="8" fill="#fff3ed" stroke="#e8530e" stroke-width="2" filter="url(#sh)"/>
  <text x="795" y="100" text-anchor="middle" fill="#b33f08" font-size="13" font-weight="bold">Model Registry</text>
  <text x="795" y="120" text-anchor="middle" fill="#888" font-size="10">CATHAY_BANK_DB.ML</text>
  <line x1="710" y1="130" x2="880" y2="130" stroke="#ffd4bf" stroke-width="1"/>
  <text x="795" y="152" text-anchor="middle" fill="#b33f08" font-size="10">cathay_churn_model/v1</text>
  <text x="795" y="172" text-anchor="middle" fill="#5a3ec8" font-size="10">cathay_credit_risk_model/v1</text>
  <text x="795" y="192" text-anchor="middle" fill="#007a31" font-size="10">cathay_ltv_model/v1</text>

  <text x="460" y="275" text-anchor="middle" fill="#1a1a2e" font-size="16" font-weight="bold">Model Performance Metrics</text>

  <rect x="30" y="295" width="270" height="185" rx="8" fill="#fff3ed" stroke="#e8530e" stroke-width="1.5" filter="url(#sh)"/>
  <text x="165" y="320" text-anchor="middle" fill="#b33f08" font-size="14" font-weight="bold">Churn Prediction</text>
  <text x="165" y="340" text-anchor="middle" fill="#888" font-size="11">Target: IS_ACTIVE = False</text>
  <line x1="40" y1="350" x2="290" y2="350" stroke="#ffd4bf" stroke-width="1"/>
  <text x="50" y="370" fill="#333" font-size="11">Accuracy</text>
  <text x="280" y="370" text-anchor="end" fill="#b33f08" font-size="11" font-weight="bold">94.25%</text>
  <text x="50" y="392" fill="#333" font-size="11">ROC-AUC</text>
  <text x="280" y="392" text-anchor="end" fill="#b33f08" font-size="11" font-weight="bold">0.3641</text>
  <text x="50" y="414" fill="#333" font-size="11">Precision / Recall / F1</text>
  <text x="280" y="414" text-anchor="end" fill="#888" font-size="11">0.0 / 0.0 / 0.0</text>
  <line x1="40" y1="425" x2="290" y2="425" stroke="#ffd4bf" stroke-width="0.5"/>
  <text x="50" y="445" fill="#b33f08" font-size="10">Top: Income, Balance, Credit Score</text>
  <text x="50" y="463" fill="#888" font-size="9">GradientBoostingClassifier | 200 estimators</text>

  <rect x="325" y="295" width="270" height="185" rx="8" fill="#f3f0ff" stroke="#7b61ff" stroke-width="1.5" filter="url(#sh)"/>
  <text x="460" y="320" text-anchor="middle" fill="#5a3ec8" font-size="14" font-weight="bold">Credit Risk</text>
  <text x="460" y="340" text-anchor="middle" fill="#888" font-size="11">Target: Loan Default</text>
  <line x1="335" y1="350" x2="585" y2="350" stroke="#d4c8ff" stroke-width="1"/>
  <text x="345" y="370" fill="#333" font-size="11">Accuracy</text>
  <text x="575" y="370" text-anchor="end" fill="#5a3ec8" font-size="11" font-weight="bold">94.75%</text>
  <text x="345" y="392" fill="#333" font-size="11">ROC-AUC</text>
  <text x="575" y="392" text-anchor="end" fill="#5a3ec8" font-size="11" font-weight="bold">0.7198</text>
  <text x="345" y="414" fill="#333" font-size="11">Precision / Recall / F1</text>
  <text x="575" y="414" text-anchor="end" fill="#888" font-size="11">0.0 / 0.0 / 0.0</text>
  <line x1="335" y1="425" x2="585" y2="425" stroke="#d4c8ff" stroke-width="0.5"/>
  <text x="345" y="445" fill="#5a3ec8" font-size="10">Top: DTI, Income, Months Since Orig</text>
  <text x="345" y="463" fill="#888" font-size="9">GradientBoostingClassifier | 200 estimators</text>

  <rect x="620" y="295" width="270" height="185" rx="8" fill="#edf9f0" stroke="#00a843" stroke-width="1.5" filter="url(#sh)"/>
  <text x="755" y="320" text-anchor="middle" fill="#007a31" font-size="14" font-weight="bold">Customer LTV</text>
  <text x="755" y="340" text-anchor="middle" fill="#888" font-size="11">Target: Relationship Value</text>
  <line x1="630" y1="350" x2="880" y2="350" stroke="#b9f6ca" stroke-width="1"/>
  <text x="640" y="370" fill="#333" font-size="11">R-squared</text>
  <text x="870" y="370" text-anchor="end" fill="#007a31" font-size="11" font-weight="bold">0.9987</text>
  <text x="640" y="392" fill="#333" font-size="11">Mean Absolute Error</text>
  <text x="870" y="392" text-anchor="end" fill="#007a31" font-size="11" font-weight="bold">$15,317</text>
  <text x="640" y="414" fill="#333" font-size="11">Median / Mean LTV</text>
  <text x="870" y="414" text-anchor="end" fill="#888" font-size="11">$537K / $875K</text>
  <line x1="630" y1="425" x2="880" y2="425" stroke="#b9f6ca" stroke-width="0.5"/>
  <text x="640" y="445" fill="#007a31" font-size="10">Top: Balance, Income, Loans</text>
  <text x="640" y="463" fill="#888" font-size="9">GradientBoostingRegressor | 200 estimators</text>
</svg>